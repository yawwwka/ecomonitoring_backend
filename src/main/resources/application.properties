spring.application.name=ecomonitoring

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${POSTGRESQL_HOST:localhost}:${POSTGRESQL_PORT:5432}/${POSTGRESQL_DBNAME:ecomonitoring}
spring.datasource.username=${POSTGRESQL_USER:gen_user}
spring.datasource.password=${POSTGRESQL_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# PostGIS
spring.jpa.properties.hibernate.integration.enable.spatial=true

